# Runs repository security validation on pull requests (Phase 5–6).
# checkout → validate-security.sh → shellcheck (same scope as bash -n via run-shellcheck.sh).

name: Security validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-validate:
    name: security-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run validate-security.sh
        run: ./scripts/validate-security.sh

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: ./scripts/run-shellcheck.sh
